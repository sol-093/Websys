name: CI

on:
  push:
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring, openssl
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP Lint
        run: composer lint

      - name: PHPUnit
        run: composer test
        env:
          DB_DRIVER: sqlite
          DB_SQLITE_PATH: storage/testing.sqlite
          DB_BOOTSTRAP_DATABASE: '1'
          CACHE_PATH: storage/cache/testing

      - name: Static Analysis
        run: composer analyse

      - name: Security Audit
        run: composer audit
